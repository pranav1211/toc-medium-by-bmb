<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Medium TOC — by BMB</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      background: #fff;
      font-family: 'DM Sans', -apple-system, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
    }

    .header {
      background: #1a1a1a;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 32px; height: 32px;
      border-radius: 7px;
      flex-shrink: 0;
      object-fit: cover;
    }

    .header-text h1 { font-size: 13px; font-weight: 600; color: #fff; }
    .header-text p  { font-size: 10px; color: rgba(255,255,255,0.4); font-family: 'DM Mono', monospace; margin-top: 1px; }

    .body { padding: 16px; }

    /* Status indicator */
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 14px;
      font-size: 12px;
    }
    .status.ok   { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .status.warn { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .status .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status.ok   .dot { background: #22c55e; }
    .status.warn .dot { background: #f59e0b; }

    /* Open button */
    #open-btn {
      width: 100%;
      background: #1a1a1a;
      color: #e8ff6b;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.15s;
      margin-bottom: 10px;
    }
    #open-btn:hover { background: #333; }
    #open-btn:disabled { background: #ccc; color: #fff; cursor: not-allowed; }

    .hint {
      font-size: 11px;
      color: #999;
      text-align: center;
      font-family: 'DM Mono', monospace;
      line-height: 1.5;
    }

    .divider { border: none; border-top: 1px solid #f0f0f0; margin: 14px 0; }

    /* How to steps */
    .steps { list-style: none; }
    .steps li {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
      font-size: 12px;
      color: #555;
      line-height: 1.4;
    }
    .step-num {
      width: 18px; height: 18px;
      background: #1a1a1a;
      color: #e8ff6b;
      border-radius: 50%;
      font-size: 9px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-family: 'DM Mono', monospace;
    }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid #f0f0f0;
      font-size: 9px;
      color: #bbb;
      font-family: 'DM Mono', monospace;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="header">
  <img src="icons/bmblogo.png" class="logo" />
  <div class="header-text">
    <h1>Medium TOC — by BMB</h1>
    <p>by Beyond Me Btw</p>
  </div>
</div>

<div class="body">
  <div id="status-box" class="status warn">
    <span class="dot"></span>
    <span id="status-text">Checking page...</span>
  </div>

  <button id="open-btn" disabled>Open TOC Panel</button>

  <div class="hint" id="hint-text">Open a Medium draft in edit mode first</div>

  <hr class="divider" />

  <ul class="steps">
    <li>
      <span class="step-num">1</span>
      <span>Open a Medium draft <strong>(URL must have /edit)</strong></span>
    </li>
    <li>
      <span class="step-num">2</span>
      <span>Click <strong>Open TOC Panel</strong> — or press <strong>Alt+T</strong> on the page</span>
    </li>
    <li>
      <span class="step-num">3</span>
      <span>Click a paragraph in your draft, then hit <strong>Insert</strong></span>
    </li>
  </ul>
</div>

<div class="footer">All settings saved automatically</div>

<script src="popup.js"></script>
</body>
</html>
